<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área pessoal</title>
    <link rel="stylesheet" href="pessoal.css">
    <link rel="stylesheet" href="Anotacao/anotacao.css">
    <link rel="stylesheet" href="Resumo/resumo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <!-- Quill CSS — adicionar no <head> junto aos outros links -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css">

<link rel="stylesheet" href="/ia/ia.css">


<body data-disciplina="pessoal">
    
</body>
    <style>
        /* ── Botão Voltar — embaixo do Entrar ────────── */
        .back-link-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
            margin-top: .6rem;
            padding: .55rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.07);
            background: transparent;
            color: rgba(255,255,255,.38);
            font-size: .8rem;
            font-family: 'DM Sans', sans-serif;
            text-decoration: none;
            letter-spacing: .01em;
            transition: background .2s, border-color .2s, color .2s;
        }
        .back-link-login:hover {
            background: rgba(255,255,255,.05);
            border-color: rgba(255,255,255,.14);
            color: rgba(255,255,255,.65);
        }
        .back-link-login i {
            font-size: .7rem;
        }

        /* ── tab-prog nunca some em 0% ─────────────── */
        .tab-prog {
            display: block;
            min-height: .85em;
        }
    </style>
</head>
<body>

    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="bg-glow g3"></div>

    <!-- ══════════════ LOGIN ══════════════ -->
    <section id="login-screen" class="screen">
        <div class="login-wrap">
            <div class="login-icon-ring">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h1 class="login-title">Área Pessoal</h1>
            <p class="login-sub">Seu painel de estudos</p>

            <div class="login-fields">
                <div class="field-wrap">
                    <i class="fas fa-user field-icon"></i>
                    <input type="text" id="input-nome" placeholder="Nome" autocomplete="off">
                </div>
                <div class="field-wrap">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="input-senha" placeholder="Senha" autocomplete="off">
                    <button class="toggle-senha" type="button"><i class="fas fa-eye"></i></button>
                </div>
                <div id="login-error" class="login-error hidden">
                    <i class="fas fa-triangle-exclamation"></i><span>Nome ou senha incorretos</span>
                </div>
                <button id="btn-entrar" class="btn-entrar">
                    Entrar <i class="fas fa-arrow-right"></i>
                </button>
                <a href="../index.html" class="back-link-login">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
            </div>
        </div>
    </section>

    <!-- ══════════════ DASHBOARD ══════════════ -->
    <section id="dashboard-screen" class="screen">

        <nav class="topbar">
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Início</a>
            <div class="topbar-user">
                <div class="avatar-ring"><i class="fas fa-user"></i></div>
                <span id="dash-nome-usuario">—</span>
            </div>
            <button id="btn-sair" class="btn-sair">
                <i class="fas fa-right-from-bracket"></i> Sair
            </button>
        </nav>

        <div class="dash-layout">

            <aside class="disc-sidebar">
                <p class="sidebar-label">Disciplinas</p>
                <div id="disc-tabs" class="disc-tabs"></div>

                <div class="overall-progress">
                    <div class="op-label">
                        <span>Progresso geral</span>
                        <span id="op-text">0%</span>
                    </div>
                    <div class="op-bar">
                        <div id="op-fill" class="op-fill" style="width:0%"></div>
                    </div>
                </div>
            </aside>

            <main class="disc-panel" id="disc-panel"></main>

        </div>

    </section>

    <script src="../storage.js"></script>
    <script type="module" src="pessoal.js"></script>

    <button class="ia-fab-custom" onclick="IA.abrirIADisciplina()">
  <span class="ia-fab-icon">✦</span>
  <span class="ia-fab-label">Assistente IA</span>
</button>

<script src="/ia/ia.js" defer></script>
</body>
</html>
