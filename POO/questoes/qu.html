<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões Personalizadas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="qu.css">
</head>

<body>

    <!-- Header -->
    <div class="page-wrapper">

        <div class="quiz-header">
            <div class="header-content">
                <div class="icon-wrapper">
                    <i class="fas fa-file-lines"></i>
                </div>
                <div class="header-text">
                    <h1>QUESTÕES</h1>
                    <p class="subtitle">Sistemas Operacionais · Revisão</p>
                </div>
            </div>
        </div>

        <!-- Quiz Container -->
        <div class="quiz-container" id="quiz-container">
            <!-- Questões serão inseridas aqui pelo JavaScript -->
        </div>

        <!-- Botões principais -->
        <div class="submit-container">
            
            <div class="buttons-container">
                
                <a href="../poo.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <button id="clear" class="action-button clear-button">
                    <i class="fas fa-eraser"></i> Limpar
                </button>
                <button id="submit" class="action-button submit-button">
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
                <button id="restart" class="action-button restart-button" style="display: none;">
                    <i class="fas fa-redo"></i> Reiniciar
                </button>
                <button id="reveal" class="action-button reveal-button">
                    <i class="fas fa-eye"></i> Revelar
                </button>
            </div>
        </div>

        <!-- Resultados -->
        <div id="results" class="results"></div>

        <div class="page-footer">Questões Personalizadas · SO</div>

    </div>

    <!-- Navegação flutuante -->
    <div class="nav-float">
        <button id="btn-up" class="nav-btn" title="Ir ao topo"><i class="fas fa-arrow-up"></i></button>
        <button id="btn-left" class="nav-btn" title="Voltar"><i class="fas fa-rotate-left"></i></button>
        <button id="btn-down" class="nav-btn" title="Ir ao final"><i class="fas fa-arrow-down"></i></button>
        <div class="nav-divider"></div>
        <button id="clearButton" class="nav-btn" title="Limpar respostas"><i class="fas fa-eraser"></i></button>
        <button id="submitButton" class="nav-btn" title="Enviar quiz"><i class="fas fa-paper-plane"></i></button>
        <button id="revealButton" class="nav-btn" title="Revelar respostas"><i class="fas fa-eye"></i></button>
    </div>

    <script src="qu.js"></script>
    <script>
        // Carrega storage.js sem bloquear o quiz caso o arquivo não exista
        var s = document.createElement('script');
        s.src = '../../../storage.js';
        s.onerror = function() { console.warn('storage.js não encontrado — auto-save desativado.'); };
        document.body.appendChild(s);
    </script>

</body>
</html>
