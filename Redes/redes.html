<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes de Computadores I</title>
    <link rel="stylesheet" href="redes.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../IAs/ia.css">
    
</head>
<body data-disciplina="redes">
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <main class="container">
        <div class="header">
            <div class="icon-wrapper">
                <i class="fas fa-pen-ruler"></i>
            </div>
            <h1>Redes</h1>
            <p class="subtitle">Arquitetura, Protocolos e Camadas de Comunicação</p>
        </div>

        <div class="cards-container">
                <a href="./Ava/ava.html" class="card">
                <div class="card-top">
                    <div class="card-icon icon-ava">
                        <i class="fas fa-globe"></i>
                    </div>
                    <h3>AVA</h3>
                </div>
                <p>Questões da Revisão da Luzia</p>
                <div class="card-footer">
                    <span class="card-tag">Quiz</span>
                    <i class="fas fa-arrow-right card-arrow"></i>
                </div>
            </a>
            <a href="./questoes/qu.html" class="card">
                <div class="card-top">
                    <div class="card-icon icon-quiz">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <h3>Questões Personalizadas</h3>
                </div>
                <p>Questões criadas especialmente com base no conteúdo estudado</p>
                <div class="card-footer">
                    <span class="card-tag">Quiz</span>
                    <i class="fas fa-arrow-right card-arrow"></i>
                </div>
            </a>
        </div>

        <div class="back-button">
            <a href="../index.html" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                Voltar
            </a>
        </div>

        <footer class="footer">
            <p>© 2025 Portal de Disciplinas — Desenvolvido para facilitar seus estudos</p>
        </footer>
    </main>

    <button class="ia-fab-custom" onclick="IA.abrirIADisciplina()">
        <span class="ia-fab-icon">✦</span>
        <span class="ia-fab-label">Assistente IA</span>
    </button>

    <script src="../IAs/ia.js" defer></script>
</body>
</html>
