<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões Personalizadas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="qu.css">
    <link rel="stylesheet" href="../../IAs/ia.css">
    <style>
        #btn-ia.nav-btn.nav-btn-ia {
            font-size: 1.1rem;
            color: #c4b8ff;
            background: rgba(124, 58, 237, 0.1);
            border: 1.5px solid rgba(124, 58, 237, 0.35);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            box-shadow: none;
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #btn-ia.nav-btn.nav-btn-ia:hover {
            background: rgba(124, 58, 237, 0.22);
            border-color: rgba(167, 139, 250, 0.6);
            color: #e8d9ff;
            transform: scale(1.05);
        }
        #btn-ia.nav-btn.nav-btn-ia.ativo {
            background: rgba(124, 58, 237, 0.25);
            border-color: rgba(192, 132, 252, 0.7);
            color: #f0e6ff;
        }
    </style>
</head>

<body data-disciplina="bancoquestoes">

    <div class="page-wrapper">

        <div class="quiz-header">
            <div class="header-content">
                <div class="icon-wrapper">
                    <i class="fas fa-file-lines"></i>
                </div>
                <div class="header-text">
                    <h1>QUESTÕES</h1>
                    <p class="subtitle">Banco de Dados · Revisão</p>
                </div>
            </div>
        </div>

        <div class="quiz-container" id="quiz-container"></div>

        <div class="submit-container">
            <div class="buttons-container">
                <a href="../banco.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <button id="restart" class="action-button restart-button">
                    <i class="fas fa-redo"></i> Reiniciar
                </button>
                <button id="reveal" class="action-button reveal-button">
                    <i class="fas fa-eye"></i> Revelar
                </button>
            </div>
        </div>

        <div id="results" class="results"></div>

        <div class="page-footer">Questões Personalizadas · Banco de Dados</div>

    </div>

    <div class="nav-float">
        <button id="btn-up"   class="nav-btn" title="Ir ao topo"><i class="fas fa-arrow-up"></i></button>
        <button id="btn-left" class="nav-btn" title="Voltar"><i class="fas fa-rotate-left"></i></button>
        <button id="btn-down" class="nav-btn" title="Ir ao final"><i class="fas fa-arrow-down"></i></button>
        <div class="nav-divider"></div>
        <button id="restartButton" class="nav-btn" title="Reiniciar quiz"><i class="fas fa-redo"></i></button>
        <button id="revealButton"  class="nav-btn" title="Revelar respostas"><i class="fas fa-eye"></i></button>
        <div class="nav-divider"></div>
        <button id="btn-toggle-modo" class="nav-btn" title="Modo Step (uma questão por vez)"
            style="background:rgba(55,138,221,0.1);border-color:rgba(55,138,221,0.35);color:#60aef5;">
            <i class="fas fa-layer-group"></i>
        </button>
        <button id="btn-ia" class="nav-btn nav-btn-ia" title="Assistente IA">
            ✦
        </button>
    </div>

    <script src="qu.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('btn-toggle-modo');
        if (btn) {
            var novoBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(novoBtn, btn);
            novoBtn.addEventListener('click', function () {
                toggleModo();
                if (quizModo === 'step') {
                    novoBtn.style.background  = 'rgba(55,138,221,0.25)';
                    novoBtn.style.borderColor = 'rgba(55,138,221,0.6)';
                    novoBtn.style.color       = '#60aef5';
                } else {
                    novoBtn.style.background  = 'rgba(55,138,221,0.1)';
                    novoBtn.style.borderColor = 'rgba(55,138,221,0.35)';
                    novoBtn.style.color       = '#60aef5';
                }
            });
        }

        document.getElementById('btn-ia')?.addEventListener('click', function () {
            const tentar = (tentativas) => {
                const fab = document.querySelector('.ia-fab-custom');
                if (fab) {
                    fab.click();
                } else if (tentativas > 0) {
                    setTimeout(() => tentar(tentativas - 1), 100);
                }
            };
            tentar(20);
        });
    });
    </script>
    <script src="../../IAs/ia.js"></script>
    <script>
        var s = document.createElement('script');
        s.src = '../../storage.js';
        s.onerror = function() { console.warn('storage.js não encontrado — auto-save desativado.'); };
        document.body.appendChild(s);
    </script>

</body>
</html>
