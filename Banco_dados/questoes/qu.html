<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões Personalizadas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="qu.css">
    <link rel="stylesheet" href="/ia/ia.css">
    <link rel="stylesheet" href="/ia/ia-btn.css">
</head>

<body data-disciplina="bancoquestoes">

    <div class="page-wrapper">

        <div class="quiz-header">
            <div class="header-content">
                <div class="icon-wrapper">
                    <i class="fas fa-file-lines"></i>
                </div>
                <div class="header-text">
                    <h1>QUESTÕES</h1>
                    <p class="subtitle">Banco de Dados · Revisão</p>
                </div>
            </div>
        </div>

        <div class="quiz-container" id="quiz-container"></div>

        <div class="submit-container">
            <div class="buttons-container">
                <a href="../banco.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <button id="restart" class="action-button restart-button">
                    <i class="fas fa-redo"></i> Reiniciar
                </button>
                <button id="reveal" class="action-button reveal-button">
                    <i class="fas fa-eye"></i> Revelar
                </button>
            </div>
        </div>

        <div id="results" class="results"></div>

        <div class="page-footer">Questões Personalizadas · Banco de Dados</div>

    </div>

    <div class="nav-float">
        <button id="btn-up" class="nav-btn" title="Ir ao topo"><i class="fas fa-arrow-up"></i></button>
        <button id="btn-left" class="nav-btn" title="Voltar"><i class="fas fa-rotate-left"></i></button>
        <button id="btn-down" class="nav-btn" title="Ir ao final"><i class="fas fa-arrow-down"></i></button>
        <div class="nav-divider"></div>
        <button id="restartButton" class="nav-btn" title="Reiniciar quiz"><i class="fas fa-redo"></i></button>
        <button id="revealButton" class="nav-btn" title="Revelar respostas"><i class="fas fa-eye"></i></button>
    </div>

    <button class="ia-fab-custom" onclick="IA.abrirIADisciplina()">
        <span class="ia-fab-icon">✦</span>
        <span class="ia-fab-label">Assistente IA</span>
    </button>

    <script src="qu.js"></script>
    <script src="/ia/ia.js" defer></script>
    <script>
        var s = document.createElement('script');
        s.src = '../../../storage.js';
        s.onerror = function() { console.warn('storage.js não encontrado — auto-save desativado.'); };
        document.body.appendChild(s);
    </script>

</body>
</html>
